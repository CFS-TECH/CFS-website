openapi: 3.0.0
info:
  title: CFS Project Backend APIs
  description: API documentation for the CFS Full-Stack Platform
  version: 1.0.0
servers:
  - url: http://localhost:5000/api
    description: Local development server
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Lead:
      type: object
      required: [type, email, phone]
      properties:
        type:
          type: string
          enum: [popup, quote, contact]
        firstName:
          type: string
        lastName:
          type: string
        companyName:
          type: string
        email:
          type: string
        phone:
          type: string
        service:
          type: string
        subject:
          type: string
        message:
          type: string
    Career:
      type: object
      required: [fullName, email, phone, applyingFor, category, resume]
      properties:
        fullName:
          type: string
        email:
          type: string
        phone:
          type: string
        applyingFor:
          type: string
          enum: [job, internship]
        category:
          type: string
        resume:
          type: string
          format: binary
        message:
          type: string
    AdminLogin:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string
    Blog:
      type: object
      required: [title, slug, content]
      properties:
        title:
          type: string
        slug:
          type: string
        content:
          type: string
        excerpt:
          type: string
        image:
          type: string
        category:
          type: string
        tags:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [draft, published]
    Newsletter:
      type: object
      required: [email]
      properties:
        email:
          type: string

paths:
  /auth/login:
    post:
      summary: Admin Login
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminLogin'
      responses:
        '200':
          description: Successful login
          content:
            application/json:
              example:
                success: true
                data:
                  _id: "example_id"
                  email: "admin@example.com"
                  token: "jwt_token_here"
        '401':
          description: Invalid email or password

  /leads:
    post:
      summary: Submit a new Lead
      tags: [Leads]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Lead'
      responses:
        '201':
          description: Lead created successfully
    get:
      summary: Get all leads (Admin)
      tags: [Leads]
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: type
          schema:
            type: string
          description: Filter leads by type (popup, quote, contact)
      responses:
        '200':
          description: List of leads returned
        
  /leads/{id}:
    delete:
      summary: Delete a Lead
      tags: [Leads]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Lead deleted successfully

  /careers:
    post:
      summary: Submit job or internship application
      tags: [Careers]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Career'
      responses:
        '201':
          description: Application submitted successfully (including resume upload to Cloudinary)
    get:
      summary: Get all career applications (Admin)
      tags: [Careers]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of applications returned

  /careers/{id}:
    delete:
      summary: Delete a Career Application
      tags: [Careers]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Application deleted successfully

  /blogs:
    post:
      summary: Create a newly authored Blog Post
      tags: [Blogs]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Blog'
      responses:
        '201':
          description: Blog created
    get:
      summary: Get all published blogs
      tags: [Blogs]
      responses:
        '200':
          description: List of blogs

  /blogs/{slug}:
    get:
      summary: Get blog by slug
      tags: [Blogs]
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Single blog content

  /blogs/{id}:
    put:
      summary: Update a Blog Post
      tags: [Blogs]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Blog'
      responses:
        '200':
          description: Application updated successfully
    delete:
      summary: Delete Blog Post
      tags: [Blogs]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Application deleted successfully

  /newsletter:
    post:
      summary: Subscribe to Newsletter
      tags: [Newsletter]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Newsletter'
      responses:
        '201':
          description: Subscribed successfully
        '400':
          description: Already subscribed
    get:
      summary: Get all subscribers
      tags: [Newsletter]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List returned
